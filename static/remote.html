<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Telecomando — SC Portal</title>
<meta name="theme-color" content="#7c5cff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Telecomando">
<link rel="icon" href="/icon-remote-192.png">
<link rel="apple-touch-icon" href="/icon-remote-180.png">
<link rel="manifest" id="mf-link" href="/api/pwa/manifest?kind=remote">
<style>
  :root{
    color-scheme:dark;
    --bg:#0a0a10; --panel:#14141d; --panel2:#1b1b28; --panel3:#22222f;
    --line:#2a2a3c; --txt:#f2f2f7; --dim:#8b8ba3;
    --accent:#7c5cff; --accent2:#9d7bff; --danger:#ff6b6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:
    radial-gradient(120% 80% at 50% -10%, #1a1630 0%, var(--bg) 55%);
    color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  #rc{max-width:460px;margin:0 auto;min-height:100%;
      padding:18px 18px calc(18px + env(safe-area-inset-bottom));
      display:flex;flex-direction:column;gap:16px;}
  header{display:flex;align-items:center;gap:10px;color:var(--dim);
      font-size:.8rem;font-weight:600;letter-spacing:.04em;padding:2px 2px 0;}
  header .brand{display:flex;align-items:center;gap:8px;color:var(--txt);font-weight:700;font-size:.95rem;letter-spacing:0;}
  header .brand img{width:22px;height:22px;border-radius:6px;}
  header .status{margin-left:auto;display:flex;align-items:center;gap:7px;text-transform:uppercase;}
  header .dot{width:8px;height:8px;border-radius:50%;background:#3a3a4d;transition:background .3s;}
  header.live .dot{background:#4ade80;box-shadow:0 0 10px #4ade80aa;}
  .pw-btn{margin-left:10px;width:34px;height:34px;flex:none;border-radius:10px;background:#1e1420;border:1px solid #3a2230;color:var(--danger);display:flex;align-items:center;justify-content:center;}
  .pw-btn:active{transform:scale(.92);}

  /* Menù a tendina download */
  .dl{border:1px solid var(--line);border-radius:16px;background:var(--panel);overflow:hidden;}
  .dl-toggle{width:100%;display:flex;align-items:center;gap:10px;padding:15px 16px;
      background:none;border:none;color:var(--txt);font:inherit;font-weight:600;cursor:pointer;}
  .dl-toggle .chev{margin-left:auto;transition:transform .25s;color:var(--dim);}
  .dl.open .dl-toggle .chev{transform:rotate(180deg);}
  .dl-ic{width:22px;height:22px;color:var(--accent2);}
  .dl-count{color:var(--dim);font-weight:500;font-size:.85rem;}
  .dl-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .dl.open .dl-body{max-height:64vh;overflow-y:auto;}
  .dl-list{padding:4px 4px 8px;}
  .dl-empty{padding:18px;color:var(--dim);text-align:center;font-size:.9rem;}

  /* Vista download in stile SC Portal: locandine + stagioni */
  .rdl-sec{font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin:10px 6px 6px;}
  .rdl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 4px 6px;}
  .rdl-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden;padding:0;display:flex;flex-direction:column;text-align:left;cursor:pointer;color:var(--txt);}
  .rdl-card:active{transform:scale(.97);}
  .rdl-thumb{aspect-ratio:2/3;width:100%;background:linear-gradient(135deg,#26263a,#191926);position:relative;}
  .rdl-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .rdl-thumb .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;background:rgba(10,10,16,.35);}
  .rdl-card:active .rdl-thumb .pl{opacity:1;}
  .rdl-card-nm{font-size:.72rem;padding:6px 7px;line-height:1.25;color:var(--txt);}
  .rdl-card.playing{outline:2px solid var(--accent);}

  .rdl-series{border:1px solid var(--line);border-radius:12px;margin:6px 4px;overflow:hidden;background:var(--panel2);}
  .rdl-series-head{display:flex;align-items:center;gap:10px;width:100%;padding:8px;background:none;border:none;color:var(--txt);cursor:pointer;text-align:left;}
  .rdl-poster{width:46px;height:66px;border-radius:8px;overflow:hidden;flex:none;background:linear-gradient(135deg,#26263a,#191926);}
  .rdl-poster img{width:100%;height:100%;object-fit:cover;display:block;}
  .rdl-s-meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
  .rdl-s-name{font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rdl-s-sub{color:var(--dim);font-size:.78rem;}
  .rdl-series .chev{color:var(--dim);transition:transform .25s;flex:none;}
  .rdl-series.open .chev{transform:rotate(180deg);}
  .rdl-seasons{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .rdl-series.open .rdl-seasons{max-height:2400px;}
  .rdl-season-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--accent2);padding:9px 12px 3px;}
  .rdl-ep{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:10px 12px;background:none;border:none;border-top:1px solid var(--line);color:var(--txt);font-size:.86rem;cursor:pointer;}
  .rdl-ep:active{background:var(--panel3);}
  .rdl-ep .en{flex:none;width:20px;color:var(--dim);font-variant-numeric:tabular-nums;}
  .rdl-ep.playing{color:var(--accent2);font-weight:700;}
  .rdl-ep.playing .en{color:var(--accent2);}

  .card{background:linear-gradient(180deg,var(--panel) 0%,#101019 100%);
      border:1px solid var(--line);border-radius:20px;padding:20px 18px;box-shadow:0 18px 40px -22px #000;}
  #title{font-size:1.22rem;font-weight:700;line-height:1.3;text-align:center;
      min-height:2.4em;display:flex;align-items:center;justify-content:center;}
  #sub{margin-top:2px;text-align:center;color:var(--dim);font-size:.84rem;min-height:1.1em;}

  .seekwrap{margin-top:16px;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;background:var(--panel3);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent2);border:3px solid #fff;box-shadow:0 2px 8px #0008;}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent2);border:3px solid #fff;}
  #times{display:flex;justify-content:space-between;margin-top:8px;font-size:.78rem;color:var(--dim);font-variant-numeric:tabular-nums;}

  .controls{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:18px;align-items:center;}
  button{border:none;background:none;color:var(--txt);cursor:pointer;font:inherit;}
  .rc-btn{aspect-ratio:1/1;border-radius:18px;background:var(--panel2);border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;position:relative;
      transition:transform .08s,background .15s,opacity .15s;}
  .rc-btn:active{transform:scale(.92);background:var(--panel3);}
  .rc-btn svg{width:25px;height:25px;}
  .rc-btn .n{position:absolute;font-size:.58rem;font-weight:700;color:var(--dim);bottom:9px;}
  .rc-btn.disabled{opacity:.3;pointer-events:none;}
  #pp{border-radius:20px;background:linear-gradient(180deg,var(--accent2),var(--accent));border:none;box-shadow:0 10px 22px -10px var(--accent);}
  #pp svg{width:30px;height:30px;}

  .vol{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .vbtn{width:46px;height:46px;flex:none;border-radius:14px;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;transition:transform .08s,background .15s;}
  .vbtn:active{transform:scale(.92);background:var(--panel3);}
  .vbtn svg{width:22px;height:22px;}
  .vbtn.muted{color:#fff;border-color:var(--accent);background:linear-gradient(180deg,var(--accent2),var(--accent));box-shadow:0 6px 16px -8px var(--accent);}
  .vrange{flex:1;}
  .vrange::-webkit-slider-thumb{width:18px;height:18px;}
  .vrange::-moz-range-thumb{width:18px;height:18px;}
  .vlevel{flex:1;height:6px;border-radius:999px;background:var(--panel3);overflow:hidden;}
  .vfill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .12s;}

  .footer{display:flex;gap:10px;margin-top:2px;}
  .flat{flex:1;height:50px;border-radius:14px;background:var(--panel2);border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;gap:8px;font-size:.9rem;font-weight:600;transition:transform .08s,background .15s;}
  .flat:active{transform:scale(.97);}
  .flat svg{width:18px;height:18px;}
  #stop{color:var(--danger);border-color:#3a2230;background:#1e1420;}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
      background:#26263a;color:#fff;border:1px solid var(--line);padding:12px 18px;border-radius:14px;
      font-size:.9rem;max-width:88%;text-align:center;opacity:0;pointer-events:none;
      transition:opacity .25s,transform .25s;box-shadow:0 12px 30px -10px #000;z-index:9;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="rc">
  <header id="hdr">
    <span class="brand"><img src="/icon-remote-192.png" alt="">Telecomando</span>
    <span class="status"><span class="dot"></span><span id="conn">Connessione…</span></span>
    <button id="power-btn" class="pw-btn" title="Spegni SC Portal" aria-label="Spegni SC Portal">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
    </button>
  </header>

  <div class="dl" id="dl">
    <button class="dl-toggle" id="dl-toggle" aria-expanded="false">
      <svg class="dl-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      <span>I tuoi download</span><span class="dl-count" id="dl-count"></span>
      <svg class="chev" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
    <div class="dl-body"><div class="dl-list" id="dl-list"><div class="dl-empty">Apri per vedere i tuoi download</div></div></div>
  </div>

  <div class="card">
    <div id="title">—</div>
    <div id="sub"></div>
    <div class="seekwrap">
      <input type="range" id="seek" min="0" max="1000" value="0" step="1" aria-label="Posizione">
      <div id="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    </div>

    <div class="controls">
      <button class="rc-btn" id="prev" data-a="prev" title="Precedente" aria-label="Precedente">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><rect x="4" y="4" width="2.4" height="16" rx="1.2"></rect></svg>
      </button>
      <button class="rc-btn" data-a="seekBy" data-v="-30" title="-30 secondi" aria-label="Indietro 30 secondi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.5 15a9 9 0 1 0 2.1-9.4L1 10"></path><text x="12.4" y="15.4" font-size="7.5" font-weight="800" fill="currentColor" stroke="none" text-anchor="middle">30</text></svg>
      </button>
      <button class="rc-btn" id="pp" data-a="toggle" title="Play/Pausa" aria-label="Play o pausa">
        <svg id="ppicon" viewBox="0 0 24 24" fill="currentColor"><polygon points="7 4 20 12 7 20 7 4"></polygon></svg>
      </button>
      <button class="rc-btn" data-a="seekBy" data-v="30" title="+30 secondi" aria-label="Avanti 30 secondi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.5 15a9 9 0 1 1-2.1-9.4L23 10"></path><text x="11.6" y="15.4" font-size="7.5" font-weight="800" fill="currentColor" stroke="none" text-anchor="middle">30</text></svg>
      </button>
      <button class="rc-btn" id="next" data-a="next" title="Successivo" aria-label="Successivo">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><rect x="17.6" y="4" width="2.4" height="16" rx="1.2"></rect></svg>
      </button>
    </div>

    <div class="vol">
      <button class="vbtn" id="mute" data-a="mute" title="Muto" aria-label="Muto">
        <svg id="muteicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
      </button>
      <button class="vbtn" data-a="volDown" title="Volume giù" aria-label="Volume giù">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      </button>
      <input type="range" id="vol" class="vrange" min="0" max="100" value="100" aria-label="Volume">
      <button class="vbtn" data-a="volUp" title="Volume su" aria-label="Volume su">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
      </button>
    </div>
  </div>

  <div class="footer">
    <button class="flat" data-a="fs" title="Schermo intero sul PC/TV">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
      Schermo intero
    </button>
    <button class="flat" id="stop" data-a="stop" title="Chiudi il player sul PC">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="3"></rect></svg>
      Stop
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="remote.js?v=11"></script>
</body>
</html>
