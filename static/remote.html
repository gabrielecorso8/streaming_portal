<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Telecomando — SC Portal</title>
<meta name="theme-color" content="#7c5cff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Telecomando">
<link rel="icon" href="/remote-192.png">
<link rel="apple-touch-icon" href="/remote-180.png">
<link rel="manifest" id="mf-link" href="/api/pwa/manifest?kind=remote">
<style>
  :root{
    color-scheme:dark;
    --bg:#0a0a10; --panel:#14141d; --panel2:#1b1b28;
    --line:#2a2a3c; --txt:#f2f2f7; --dim:#8b8ba3;
    --accent:#7c5cff; --accent2:#9d7bff; --danger:#ff6b6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:
    radial-gradient(120% 80% at 50% -10%, #1a1630 0%, var(--bg) 55%);
    color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  #rc{max-width:440px;margin:0 auto;min-height:100%;padding:22px 20px calc(22px + env(safe-area-inset-bottom));
      display:flex;flex-direction:column;gap:22px;justify-content:center;}
  header{display:flex;align-items:center;gap:10px;justify-content:center;color:var(--dim);
      font-size:.82rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
  header .dot{width:8px;height:8px;border-radius:50%;background:#3a3a4d;transition:background .3s;}
  header.live .dot{background:#4ade80;box-shadow:0 0 10px #4ade80aa;}

  .card{background:linear-gradient(180deg,var(--panel) 0%,#101019 100%);
      border:1px solid var(--line);border-radius:22px;padding:22px 20px;
      box-shadow:0 18px 40px -20px #000;}
  #title{font-size:1.3rem;font-weight:700;line-height:1.3;text-align:center;
      min-height:2.6em;display:flex;align-items:center;justify-content:center;}
  #sub{margin-top:2px;text-align:center;color:var(--dim);font-size:.85rem;min-height:1.2em;}

  .seekwrap{margin-top:18px;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;
      background:var(--panel2);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
      background:var(--accent2);border:3px solid #fff;box-shadow:0 2px 8px #0008;cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent2);
      border:3px solid #fff;cursor:pointer;}
  #times{display:flex;justify-content:space-between;margin-top:8px;font-size:.8rem;color:var(--dim);
      font-variant-numeric:tabular-nums;}

  .controls{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:22px;}
  button{border:none;background:none;color:var(--txt);cursor:pointer;font:inherit;}
  .rc-btn{width:60px;height:60px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;position:relative;transition:transform .08s,background .15s,opacity .15s;}
  .rc-btn:active{transform:scale(.9);background:#26263a;}
  .rc-btn svg{width:26px;height:26px;}
  .rc-btn .n{position:absolute;font-size:.6rem;font-weight:700;color:var(--dim);bottom:11px;}
  .rc-btn.disabled{opacity:.32;pointer-events:none;}
  #pp{width:78px;height:78px;background:linear-gradient(180deg,var(--accent2),var(--accent));
      border:none;box-shadow:0 10px 24px -8px var(--accent);}
  #pp svg{width:32px;height:32px;}

  .footer{display:flex;gap:12px;margin-top:4px;}
  .flat{flex:1;height:52px;border-radius:16px;background:var(--panel2);border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;gap:8px;font-size:.92rem;font-weight:600;
      transition:transform .08s,background .15s;}
  .flat:active{transform:scale(.97);}
  .flat svg{width:19px;height:19px;}
  #stop{color:var(--danger);border-color:#3a2230;background:#1e1420;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
      background:#26263a;color:#fff;border:1px solid var(--line);padding:12px 18px;border-radius:14px;
      font-size:.9rem;max-width:88%;text-align:center;opacity:0;pointer-events:none;
      transition:opacity .25s,transform .25s;box-shadow:0 12px 30px -10px #000;z-index:9;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="rc">
  <header id="hdr"><span class="dot"></span><span id="conn">Connessione…</span></header>

  <div class="card">
    <div id="title">—</div>
    <div id="sub"></div>
    <div class="seekwrap">
      <input type="range" id="seek" min="0" max="1000" value="0" step="1" aria-label="Posizione">
      <div id="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    </div>

    <div class="controls">
      <button class="rc-btn" id="prev" data-a="prev" title="Precedente" aria-label="Precedente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"></polygon><rect x="4" y="4" width="2.4" height="16" rx="1.2" fill="currentColor" stroke="none"></rect></svg>
      </button>
      <button class="rc-btn" data-a="seekBy" data-v="-10" title="-10 secondi" aria-label="Indietro 10 secondi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4a8 8 0 1 1-7.6 5.5"></path><polyline points="3 3 3.4 9 9 8.4"></polyline></svg>
        <span class="n">10</span>
      </button>
      <button class="rc-btn" id="pp" data-a="toggle" title="Play/Pausa" aria-label="Play o pausa">
        <svg id="ppicon" viewBox="0 0 24 24" fill="currentColor"><polygon points="7 4 20 12 7 20 7 4"></polygon></svg>
      </button>
      <button class="rc-btn" data-a="seekBy" data-v="10" title="+10 secondi" aria-label="Avanti 10 secondi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4a8 8 0 1 0 7.6 5.5"></path><polyline points="21 3 20.6 9 15 8.4"></polyline></svg>
        <span class="n">10</span>
      </button>
      <button class="rc-btn" id="next" data-a="next" title="Successivo" aria-label="Successivo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"></polygon><rect x="17.6" y="4" width="2.4" height="16" rx="1.2" fill="currentColor" stroke="none"></rect></svg>
      </button>
    </div>
  </div>

  <div class="footer">
    <button class="flat" data-a="fs" title="Schermo intero sul PC/TV">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
      Schermo intero
    </button>
    <button class="flat" id="stop" data-a="stop" title="Chiudi il player sul PC">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="3"></rect></svg>
      Stop
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="remote.js?v=3"></script>
</body>
</html>
